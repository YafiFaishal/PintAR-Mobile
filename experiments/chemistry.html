<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0066FF">
  <title>Reaksi Kimia | PintAR</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body class="exp-page">

  <header class="exp-header">
    <button class="btn btn-sm btn-secondary" onclick="goTo('../index.html')">← Kembali</button>
    <h1>Reaksi Kimia</h1>
    <button class="btn btn-icon btn-secondary" id="btn-theme" aria-label="Tema">🌙</button>
  </header>

  <!-- Mode -->
  <div style="padding:var(--space-3) var(--space-4);background:var(--bg-secondary);border-bottom:1px solid var(--border-light);">
    <div class="mode-switcher" id="mode-switcher">
      <button class="mode-btn active" data-mode="sim">📱 Simulasi</button>
      <button class="mode-btn" data-mode="ar">📷 Mode AR</button>
    </div>
  </div>

  <!-- Canvas simulation -->
  <div class="sim-canvas-container" id="sim-view">
    <canvas class="sim-canvas" id="chem-canvas"></canvas>
  </div>
  <div class="ar-viewport hidden" id="ar-view"></div>

  <!-- Live Data -->
  <div class="live-data-bar">
    <div class="data-chip">
      <div class="data-label">pH</div>
      <div class="data-value" id="val-ph">14.0</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Suhu</div>
      <div class="data-value" id="val-temp">25°</div>
      <div class="data-unit">C</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Progres</div>
      <div class="data-value" id="val-progress">0%</div>
    </div>
  </div>


  <!-- Controls -->
  <div class="bottom-sheet open" id="controls-sheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-header">
      <h3>⚗️ Bahan Kimia</h3>
      <button class="btn btn-sm btn-secondary" id="btn-toggle-sheet">▼</button>
    </div>
    <div class="bottom-sheet-body">
      <div class="form-group">
        <label class="form-label">Pilih Reaksi</label>
        <select class="form-select" id="ctrl-reaction">
          <option value="neutralization">Netralisasi (NaOH + HCl)</option>
          <option value="bakingSoda">Gas (Cuka + Baking Soda)</option>
          <option value="permanganate">Oksidasi (KMnO₄ + H₂O₂)</option>
        </select>
      </div>

      <div class="card" style="padding:var(--space-3);margin-bottom:var(--space-4)">
        <p style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:4px">Persamaan Reaksi:</p>
        <p style="font-size:var(--fs-sm);font-weight:600;font-family:var(--font-mono)" id="disp-equation">NaOH + HCl → NaCl + H₂O</p>
      </div>

      <div style="display:flex;gap:var(--space-3)">
        <button class="btn btn-primary" id="btn-mix" style="flex:1">🧪 Campurkan</button>
        <button class="btn btn-secondary" id="btn-reset" style="flex:1">↺ Reset</button>
      </div>

      <p style="font-size:var(--fs-xs);color:var(--text-muted);text-align:center;margin-top:var(--space-3)">
        💡 Goyangkan HP untuk mencampur bahan!
      </p>

      <!-- pH bar -->
      <div style="margin-top:var(--space-4)">
        <label class="form-label">Skala pH</label>
        <div style="height:12px;border-radius:6px;background:linear-gradient(to right,#FF0000,#FFA500,#FFFF00,#00FF00,#0000FF,#4B0082,#9400D3);position:relative;border:1px solid var(--border-light);">
          <div id="ph-marker" style="position:absolute;top:-3px;width:4px;height:18px;background:var(--text-primary);border-radius:2px;left:100%;transform:translateX(-50%);transition:left 0.5s;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--text-muted);margin-top:2px">
          <span>Asam (0)</span><span>Netral (7)</span><span>Basa (14)</span>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script type="module" src="../js/experiments/chemistry.js"></script>
</body>
</html>
