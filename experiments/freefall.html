<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0066FF">
  <title>Gerak Jatuh Bebas | PintAR</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body class="exp-page">

  <!-- Header -->
  <header class="exp-header">
    <button class="btn btn-sm btn-secondary" onclick="goTo('../index.html')">← Kembali</button>
    <h1>Gerak Jatuh Bebas</h1>
    <button class="btn btn-icon btn-secondary" id="btn-theme" aria-label="Tema">🌙</button>
  </header>

  <!-- Mode Switcher -->
  <div style="padding:var(--space-3) var(--space-4);background:var(--bg-secondary);border-bottom:1px solid var(--border-light);">
    <div class="mode-switcher" id="mode-switcher">
      <button class="mode-btn active" data-mode="sim">📱 Simulasi</button>
      <button class="mode-btn" data-mode="ar">📷 Mode AR</button>
    </div>
  </div>

  <!-- Simulation -->
  <div class="sim-canvas-container" id="sim-view">
    <canvas class="sim-canvas" id="freefall-canvas"></canvas>
  </div>
  <div class="ar-viewport hidden" id="ar-view"></div>

  <!-- Live Data -->
  <div class="live-data-bar">
    <div class="data-chip">
      <div class="data-label">Waktu</div>
      <div class="data-value" id="val-time">0.00</div>
      <div class="data-unit">detik</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Kecepatan</div>
      <div class="data-value" id="val-velocity">0.0</div>
      <div class="data-unit">m/s</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Posisi</div>
      <div class="data-value" id="val-position">10.0</div>
      <div class="data-unit">meter</div>
    </div>
  </div>


  <!-- Bottom Sheet -->
  <div class="bottom-sheet open" id="controls-sheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-header">
      <h3>⚙️ Pengaturan</h3>
      <button class="btn btn-sm btn-secondary" id="btn-toggle-sheet">▼</button>
    </div>
    <div class="bottom-sheet-body">
      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">Ketinggian (h)</span>
          <span class="slider-value" id="disp-height">10.0 m</span>
        </div>
        <input type="range" id="ctrl-height" min="2" max="50" step="1" value="10">
      </div>

      <div class="form-group">
        <label class="form-label">Objek</label>
        <select class="form-select" id="ctrl-object">
          <option value="iron">Bola Besi (10 kg)</option>
          <option value="wood">Bola Kayu (1 kg)</option>
          <option value="feather">Bulu (0.01 kg)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Lingkungan</label>
        <select class="form-select" id="ctrl-env">
          <option value="vacuum">Ruang Hampa (tanpa hambatan)</option>
          <option value="air">Di Udara (ada hambatan)</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Gravitasi</label>
        <select class="form-select" id="ctrl-gravity">
          <option value="9.81">Bumi (9.81 m/s²)</option>
          <option value="1.62">Bulan (1.62 m/s²)</option>
          <option value="3.72">Mars (3.72 m/s²)</option>
        </select>
      </div>

      <div style="display:flex;gap:var(--space-3)">
        <button class="btn btn-primary" id="btn-drop" style="flex:1">🍎 Jatuhkan</button>
        <button class="btn btn-secondary" id="btn-reset" style="flex:1">↺ Reset</button>
      </div>

      <div style="margin-top:var(--space-4)">
        <label class="form-label">Grafik Posisi (y) vs Waktu (t)</label>
        <div class="graph-box">
          <canvas id="graph-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script type="module" src="../js/experiments/freefall.js"></script>
</body>
</html>
