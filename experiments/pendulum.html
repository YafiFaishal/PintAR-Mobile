<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0066FF">
  <title>Bandul (Pendulum) | PintAR</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body class="exp-page">

  <!-- Header -->
  <header class="exp-header">
    <button class="btn btn-sm btn-secondary" onclick="goTo('../index.html')">← Kembali</button>
    <h1>Bandul (Pendulum)</h1>
    <button class="btn btn-icon btn-secondary" id="btn-theme" aria-label="Tema">🌙</button>
  </header>

  <!-- Mode Switcher -->
  <div style="padding:var(--space-3) var(--space-4);background:var(--bg-secondary);border-bottom:1px solid var(--border-light);">
    <div class="mode-switcher" id="mode-switcher">
      <button class="mode-btn active" data-mode="sim">📱 Simulasi</button>
      <button class="mode-btn" data-mode="ar">📷 Mode AR</button>
    </div>
  </div>

  <!-- Simulation Viewport (default) -->
  <div class="sim-canvas-container" id="sim-view">
    <canvas class="sim-canvas" id="pendulum-canvas"></canvas>
  </div>

  <!-- AR Viewport (hidden initially, loaded on demand) -->
  <div class="ar-viewport hidden" id="ar-view"></div>

  <!-- Live Data Bar -->
  <div class="live-data-bar" id="data-bar">
    <div class="data-chip">
      <div class="data-label">Periode Teori</div>
      <div class="data-value" id="val-t-theory">0.00</div>
      <div class="data-unit">detik</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Periode Aktual</div>
      <div class="data-value" id="val-t-actual">0.00</div>
      <div class="data-unit">detik</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Sudut</div>
      <div class="data-value" id="val-angle">0.0°</div>
    </div>
  </div>


  <!-- Bottom Sheet Controls -->
  <div class="bottom-sheet" id="controls-sheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-header">
      <h3>⚙️ Pengaturan Bandul</h3>
      <button class="btn btn-sm btn-secondary" id="btn-toggle-sheet">▲</button>
    </div>
    <div class="bottom-sheet-body">
      <!-- Length -->
      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">Panjang Tali (L)</span>
          <span class="slider-value" id="disp-length">1.0 m</span>
        </div>
        <input type="range" id="ctrl-length" min="0.3" max="3.0" step="0.1" value="1.0">
      </div>

      <!-- Mass -->
      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">Massa (m)</span>
          <span class="slider-value" id="disp-mass">1.0 kg</span>
        </div>
        <input type="range" id="ctrl-mass" min="0.1" max="5.0" step="0.1" value="1.0">
      </div>

      <!-- Angle -->
      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">Sudut Awal (θ)</span>
          <span class="slider-value" id="disp-angle">30°</span>
        </div>
        <input type="range" id="ctrl-angle" min="5" max="60" step="1" value="30">
      </div>

      <!-- Gravity -->
      <div class="form-group">
        <label class="form-label">Gravitasi</label>
        <select class="form-select" id="ctrl-gravity">
          <option value="9.81">Bumi (9.81 m/s²)</option>
          <option value="1.62">Bulan (1.62 m/s²)</option>
          <option value="3.72">Mars (3.72 m/s²)</option>
          <option value="24.79">Jupiter (24.79 m/s²)</option>
        </select>
      </div>

      <!-- Actions -->
      <div style="display:flex;gap:var(--space-3)">
        <button class="btn btn-primary" id="btn-start" style="flex:1">▶ Ayunkan</button>
        <button class="btn btn-secondary" id="btn-reset" style="flex:1">↺ Reset</button>
      </div>

      <!-- Graph -->
      <div style="margin-top:var(--space-4)">
        <label class="form-label">Grafik Simpangan</label>
        <div class="graph-box">
          <canvas id="graph-canvas"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script type="module" src="../js/experiments/pendulum.js"></script>
</body>
</html>
