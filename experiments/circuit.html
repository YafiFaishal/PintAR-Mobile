<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#0066FF">
  <title>Rangkaian Listrik | PintAR</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="manifest" href="../manifest.json">
</head>
<body class="exp-page">

  <header class="exp-header">
    <button class="btn btn-sm btn-secondary" onclick="goTo('../index.html')">← Kembali</button>
    <h1>Rangkaian Listrik</h1>
    <button class="btn btn-icon btn-secondary" id="btn-theme" aria-label="Tema">🌙</button>
  </header>

  <div style="padding:var(--space-3) var(--space-4);background:var(--bg-secondary);border-bottom:1px solid var(--border-light);">
    <div class="mode-switcher" id="mode-switcher">
      <button class="mode-btn active" data-mode="sim">📱 Simulasi</button>
      <button class="mode-btn" data-mode="ar">📷 Mode AR</button>
    </div>
  </div>

  <div class="sim-canvas-container" id="sim-view">
    <canvas class="sim-canvas" id="circuit-canvas"></canvas>
  </div>
  <div class="ar-viewport hidden" id="ar-view"></div>

  <div class="live-data-bar">
    <div class="data-chip">
      <div class="data-label">Tegangan (V)</div>
      <div class="data-value" id="val-voltage">0.00</div>
      <div class="data-unit">Volt</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Arus (I)</div>
      <div class="data-value" id="val-current">0.00</div>
      <div class="data-unit">Ampere</div>
    </div>
    <div class="data-chip">
      <div class="data-label">R Total</div>
      <div class="data-value" id="val-resistance">0.00</div>
      <div class="data-unit">Ω</div>
    </div>
    <div class="data-chip">
      <div class="data-label">Daya (P)</div>
      <div class="data-value" id="val-power">0.00</div>
      <div class="data-unit">Watt</div>
    </div>
  </div>

  <div class="bottom-sheet open" id="controls-sheet">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-header">
      <h3>⚡ Pengaturan Rangkaian</h3>
      <button class="btn btn-sm btn-secondary" id="btn-toggle-sheet">▼</button>
    </div>
    <div class="bottom-sheet-body">
      <div class="form-group">
        <label class="form-label">Jenis Rangkaian</label>
        <select class="form-select" id="ctrl-type">
          <option value="series">Seri</option>
          <option value="parallel">Paralel</option>
          <option value="mixed">Campuran (Seri + Paralel)</option>
        </select>
      </div>

      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">Tegangan Sumber (V)</span>
          <span class="slider-value" id="disp-voltage">12 V</span>
        </div>
        <input type="range" id="ctrl-voltage" min="1" max="24" step="0.5" value="12">
      </div>

      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">R₁</span>
          <span class="slider-value" id="disp-r1">100 Ω</span>
        </div>
        <input type="range" id="ctrl-r1" min="10" max="1000" step="10" value="100">
      </div>

      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">R₂</span>
          <span class="slider-value" id="disp-r2">200 Ω</span>
        </div>
        <input type="range" id="ctrl-r2" min="10" max="1000" step="10" value="200">
      </div>

      <div class="form-group">
        <div class="slider-row">
          <span class="slider-label">R₃</span>
          <span class="slider-value" id="disp-r3">300 Ω</span>
        </div>
        <input type="range" id="ctrl-r3" min="10" max="1000" step="10" value="300">
      </div>

      <div class="card" style="padding:var(--space-3);margin-top:var(--space-3)">
        <p style="font-size:var(--fs-xs);color:var(--text-muted);margin-bottom:4px">Hukum Ohm:</p>
        <p style="font-size:var(--fs-sm);font-weight:700;font-family:var(--font-mono);color:var(--brand-primary)">V = I × R &nbsp;|&nbsp; P = V × I</p>
        <p style="font-size:var(--fs-xs);color:var(--text-secondary);margin-top:6px" id="disp-detail"></p>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script type="module" src="../js/experiments/circuit.js"></script>
</body>
</html>
