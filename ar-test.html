<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PintAR - AR Test</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #close-btn {
      position: fixed; top: 10px; right: 10px; z-index: 999999;
      padding: 12px 20px; background: red; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer;
    }
    #info {
      position: fixed; bottom: 10px; left: 10px; right: 10px; z-index: 999999;
      padding: 12px; background: rgba(0,0,0,0.8); color: white;
      border-radius: 8px; font-size: 12px; font-family: monospace;
    }
  </style>
</head>
<body>
  <button id="close-btn" onclick="window.location.href='index.html'">X Tutup</button>
  <div id="info">Status: Loading AR...</div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
  >
    <a-marker preset="hiro">
      <a-box position="0 0.5 0" material="color: red;" scale="1 1 1"></a-box>
      <a-text value="PintAR Works!" position="0 1.5 0" align="center" color="#00ff00" scale="2 2 2"></a-text>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    var info = document.getElementById('info');
    
    window.addEventListener('arjs-video-loaded', function() {
      info.textContent = 'Status: Camera active! Arahkan ke marker Hiro!';
    });

    var marker = document.querySelector('a-marker');
    if (marker) {
      marker.addEventListener('markerFound', function() {
        info.textContent = 'MARKER FOUND! Objek 3D tampil!';
        info.style.background = 'rgba(0,128,0,0.8)';
      });
      marker.addEventListener('markerLost', function() {
        info.textContent = 'Marker hilang. Arahkan kamera lagi ke Hiro.';
        info.style.background = 'rgba(0,0,0,0.8)';
      });
    }

    setTimeout(function() {
      if (info.textContent.indexOf('Loading') !== -1) {
        info.textContent = 'AR loaded. Scan marker Hiro sekarang!';
      }
    }, 5000);
  </script>
</body>
</html>
